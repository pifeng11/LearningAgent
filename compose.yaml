services:
  postgres:
    image: postgres:16-alpine
    container_name: learning-agent-postgres
    environment:
      POSTGRES_USER: learning_agent
      POSTGRES_PASSWORD: learning_agent
      POSTGRES_DB: learning_agent
    ports:
      - "55432:5432"
    volumes:
      - learning-agent-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U learning_agent -d learning_agent"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  learning-agent-postgres-data:
